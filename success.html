<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЕКИС - Сессия заблокирована</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            text-align: center;
            padding: 40px 30px;
        }

        .logo {
            height: 60px;
            margin-bottom: 30px;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
        }

        .checkmark svg {
            width: 50px;
            height: 50px;
        }

        h2 {
            color: #2e7d32;
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .button {
            display: inline-block;
            background: #007bff;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .button:hover {
            background: #0069d9;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="https://center.educom.ru/oauth/images/mosobr.svg" alt="Московское образование" onerror="this.src='https://via.placeholder.com/200x60?text=EKIS'">
        
        <div class="checkmark">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <h2> Мы заблокировали чужую сессию</h2>
        
        <p>
            Неизвестное устройство было отключено от вашего аккаунта.<br><br>
            Ваш аккаунт в безопасности. Для продолжения работы войдите в систему заново.
        </p>

        <a href="https://center.educom.ru/oauth/auth?sr=aHR0cHM6Ly9pbmZvLXNpdGVzLm1za29ici5ydQ==" class="button">
            Войти в ЕКИС
        </a>
    </div>
</body>
</html>
